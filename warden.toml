# Warden configuration — https://github.com/getsentry/warden
#
# Warden is an agentic code-review tool. "Skills" (analysis definitions) live
# in .agents/skills/ or .claude/skills/ and the built-in ones are fetched on
# demand by the action. Add more skills with:
#
#   npx @sentry/warden add <skill-name>

version = 1

[defaults]
# Severity that fails the check run (off, critical, high, medium, low, info).
# We keep this informational for now (fail-check is false in the workflow),
# but set the threshold so the meaning is explicit if it gets flipped on.
failOn = "high"
# Severity that surfaces as inline PR annotations.
reportOn = "medium"

[[skills]]
name = "code-review"

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "security-review"

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]
