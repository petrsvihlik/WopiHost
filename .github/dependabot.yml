version: 2

# The repo's nuget.config registers a private GitHub Packages feed
# (nuget.pkg.github.com/petrsvihlik) for Microsoft.CobaltCore. CI workflows
# authenticate to it via the COBALT_PACKAGES_TOKEN Actions secret, but
# Dependabot has its own separate secret store and won't see Actions secrets.
# Add the same token at https://github.com/petrsvihlik/WopiHost/settings/secrets/dependabot
# so the cobalt-github-packages registry below can authenticate.
registries:
  cobalt-github-packages:
    type: nuget-feed
    url: https://nuget.pkg.github.com/petrsvihlik/index.json
    username: petrsvihlik
    password: ${{secrets.COBALT_PACKAGES_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: "/"
    registries:
      - cobalt-github-packages
    schedule:
      interval: daily
    # Wait out the window in which a freshly published (possibly compromised) version
    # is most likely to be yanked — this repo auto-merges Dependabot PRs, so the
    # cooldown is the only human-latency between a new package and master.
    # Security-advisory updates are a separate flow and are not delayed by this.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 20
    commit-message:
      prefix: "chore(deps)"
    # Bundle same-day minor/patch bumps into one PR. Major bumps are left
    # ungrouped (one PR each) so a potentially-breaking change is reviewed on
    # its own and one bad dependency can't block the whole batch from merging.
    groups:
      nuget:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    # Same rationale as the nuget cooldown; actions are SHA-pinned, so this delays
    # the pin bump until a new action release has had a week of public scrutiny.
    cooldown:
      default-days: 7
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
