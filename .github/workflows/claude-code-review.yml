name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'

jobs:
  claude-review:
    # Internal PRs only. The Claude GitHub App's OIDC token exchange doesn't work with
    # the secret-less fork-PR context, so fork PRs are skipped here — review one manually
    # by commenting `@claude review this` (handled by claude.yml).
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # Informational: a reviewer hiccup never fails the PR's checks.
        continue-on-error: true
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The code-review plugin owns the structured review + posting (buffered inline
          # comments + summary) and reads CLAUDE.md for repo conventions. A freeform prompt
          # was tried first and posted nothing ("No buffered inline comments").
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
