name: Warden

# Mirrors pull_request.yml: pull_request_target + manual approve gate +
# 'Integrate Pull Request' environment for fork PRs. Required because Warden
# needs the model API key secret, which pull_request from forks cannot access.
on:
  pull_request_target:
    branches: [ master ]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
    - name: Approve
      run: echo For security reasons, all pull requests need to be approved first before running any automated CI.

  review:
    runs-on: ubuntu-latest
    needs: [approve]
    environment:
      name: ${{ github.event.pull_request.head.repo.full_name != github.repository && 'Integrate Pull Request' || '' }}
    env:
      WARDEN_ANTHROPIC_API_KEY: ${{ secrets.WARDEN_ANTHROPIC_API_KEY }}
      WARDEN_OPENAI_API_KEY: ${{ secrets.WARDEN_OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: getsentry/warden@v0.34.0
        with:
          config-path: warden.toml
          # Informational only for now — flip to true once we have a feel
          # for the noise level. fail-on (severity threshold) is in warden.toml.
          fail-check: false
