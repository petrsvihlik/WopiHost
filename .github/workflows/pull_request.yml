name: Pull Request

on:
  pull_request_target:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'

permissions:
  contents: read
  id-token: write # Required for OIDC

jobs:
  approve:
    runs-on: ubuntu-latest

    steps:
    - name: Approve
      run: echo For security reasons, all pull requests need to be approved first before running any automated CI.

  build:
    runs-on: ubuntu-latest

    needs: [approve]
    environment:
      name: ${{ github.event.pull_request.head.repo.full_name != github.repository && 'Integrate Pull Request' || '' }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 2
    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'
    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    - name: Set MYGET_FEED Environment Variable
      run: echo "MYGET_FEED=${{ secrets.MYGET_FEED }}" >> $GITHUB_ENV
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test --no-build --verbosity normal /p:CollectCoverage=true /p:CoverletOutputFormat=lcov
    - name: Upload coverage to Qlty
      uses: qltysh/qlty-action/coverage@v2
      with:
        oidc: true
        files: "**/coverage.*.info"
    - name: Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    #- name: Run FOSSA scan
    #  uses: fossa-contrib/fossa-action@v1
    #  with:
    #    fossa-api-key: ${{ secrets.FOSSA_API_KEY }}
