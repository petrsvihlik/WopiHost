name: Publish to NuGet

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write # Required for OIDC

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
      with:
        dotnet-version: '10.0.x'
    - name: Extract version from tag
      id: get_version
      run: |
        REF="${GITHUB_REF#refs/tags/}"
        echo "version-without-v=${REF#v}" >> $GITHUB_OUTPUT
    - name: Set Cobalt packages token
      run: echo "COBALT_PACKAGES_TOKEN=${{ secrets.COBALT_PACKAGES_TOKEN }}" >> $GITHUB_ENV
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release /p:ContinuousIntegrationBuild=true /p:Version="${{ steps.get_version.outputs.version-without-v }}"
    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release /p:CollectCoverage=true /p:CoverletOutputFormat=lcov
    - name: Upload coverage to Qlty
      uses: qltysh/qlty-action/coverage@dafbc1e328f1f92525f1a3916724bd5fa01498e8 # v2
      with:
        oidc: true
        files: "**/coverage.*.info"
        # See integrate.yml for the rationale.
        skip-missing-files: true
    - name: Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Pack
      # Output is centralized via UseArtifactsOutput (see Directory.Build.props);
      # nupkg/snupkg files land in artifacts/package/release/.
      run: dotnet pack --no-build --include-symbols --verbosity normal --configuration Release /p:PackageVersion="${{ steps.get_version.outputs.version-without-v }}"
    - name: Upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: "NuGet packages"
        path: artifacts/package/release
    - name: Publish artifacts to NuGet.org
      run: dotnet nuget push 'artifacts/package/release/*.nupkg' -s https://api.nuget.org/v3/index.json -k ${NUGET_API_KEY} --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    - name: Upload artifacts to the GitHub release
      uses: Roang-zero1/github-upload-release-artifacts-action@87271b3f8dca9feb9e9d44381fddd2db7f09d6e1 # v3
      with:
        args: artifacts/package/release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

