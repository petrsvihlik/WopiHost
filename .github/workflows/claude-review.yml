name: Claude Review

# Mirrors pull_request.yml: pull_request_target + manual approve gate +
# 'Integrate Pull Request' environment for fork PRs. Required because the
# review job needs the CLAUDE_CODE_OAUTH_TOKEN secret, which a plain
# pull_request trigger from a fork cannot access. The approve gate means a
# maintainer must approve before any review runs against fork-PR code.
on:
  pull_request_target:
    branches: [ master ]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
    - name: Approve
      run: echo For security reasons, all pull requests need to be approved first before running any automated CI.

  review:
    runs-on: ubuntu-latest
    needs: [approve]
    environment:
      name: ${{ github.event.pull_request.head.repo.full_name != github.repository && 'Integrate Pull Request' || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # continue-on-error keeps this informational: a reviewer hiccup never fails the PR's checks.
      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          # Pro/Max subscription token from `claude setup-token` — no per-use API
          # billing. Swap for `anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}`
          # to bill the API instead.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the workflow's own token for GitHub API ops (posting the review). This
          # skips the action's default OIDC -> Claude-GitHub-App token exchange, which
          # would otherwise require `id-token: write` plus the app installed on the repo.
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Informational: posts review comments, never fails the check.
          prompt: |
            Review this pull request against the conventions in CLAUDE.md.
            Report only clear, high-signal findings: real correctness bugs, WOPI
            spec violations, security issues, concurrency/TOCTOU hazards, leaky
            abstractions, and changes that are a net negative. Skip style nits and
            speculative refactors — a finding ships only if a maintainer would be
            unambiguously better off applying it. If the change looks good, say so
            in one line. Post issues as inline comments on the relevant lines plus
            a brief summary.
          claude_args: "--max-turns 25"
