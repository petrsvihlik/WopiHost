name: WOPI Validator

on:
  pull_request_target:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      test_category:
        description: 'Validator --testcategory (All, WopiCore, OfficeOnline, OfficeOnlinePlus, OfficeNativeClient)'
        required: false
        default: 'All'

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TEST_CATEGORY: ${{ inputs.test_category || 'All' }}
  HOST_URL: http://localhost:5000
  WOPI_FILE_ID: WOPITEST
  WOPI_ACCESS_TOKEN: Anonymous

jobs:
  approve:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
    - name: Approve
      run: echo "For security reasons, all pull requests need to be approved first before running any automated CI."

  validate:
    runs-on: ubuntu-latest
    needs: [approve]
    if: always() && (needs.approve.result == 'success' || needs.approve.result == 'skipped')
    environment:
      name: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository && 'Integrate Pull Request' || '' }}
    steps:
      - name: Checkout WopiHost
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Set MYGET_FEED Environment Variable
        run: echo "MYGET_FEED=${{ secrets.MYGET_FEED }}" >> $GITHUB_ENV

      - name: Cache validator package
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages/wopivalidator
          key: wopivalidator-${{ hashFiles('tools/wopi-validator/wopi-validator.csproj') }}

      - name: Publish WOPI validator from NuGet
        id: publish-validator
        # The validator is fetched from nuget.org via tools/wopi-validator/wopi-validator.csproj
        # so Dependabot can manage version bumps. PackageReference doesn't auto-copy the
        # package's content/*.xml or runtimeconfig.json, so we copy them after publish.
        run: |
          VALIDATOR_BIN="${RUNNER_TEMP}/validator-bin"
          dotnet publish tools/wopi-validator/wopi-validator.csproj -c Release -o "${VALIDATOR_BIN}"
          VALIDATOR_PKG=$(ls -d "${HOME}/.nuget/packages/wopivalidator/"*/ | sort -V | tail -1)
          cp "${VALIDATOR_PKG}content/"*.xml "${VALIDATOR_BIN}/"
          cp "${VALIDATOR_PKG}lib/net8.0/Microsoft.Office.WopiValidator.runtimeconfig.json" "${VALIDATOR_BIN}/"
          VALIDATOR_VERSION=$(basename "${VALIDATOR_PKG%/}")
          echo "bin=${VALIDATOR_BIN}" >> "$GITHUB_OUTPUT"
          echo "version=${VALIDATOR_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved WopiValidator -> ${VALIDATOR_VERSION}"

      - name: Build WopiHost.Validator
        run: dotnet build sample/WopiHost.Validator -c Release /p:ContinuousIntegrationBuild=true

      - name: Start WopiHost.Validator
        run: |
          dotnet run --no-build --project sample/WopiHost.Validator -c Release -- --urls "${{ env.HOST_URL }}" > host.log 2>&1 &
          echo $! > host.pid
          for i in $(seq 1 60); do
            if curl -fsS "${{ env.HOST_URL }}/health" >/dev/null 2>&1; then
              echo "Host healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Host failed to become healthy within 60s"
          cat host.log
          exit 1

      - name: Run WOPI validator
        id: validate
        continue-on-error: true
        run: |
          # Run without --ignore-skipped so skipped tests are visible in the
          # captured log/artifact. We derive pass/fail/skip counts ourselves
          # so the exit code reflects real failures only (the validator's own
          # exit code treats skipped tests as failures, which is too noisy
          # for this host because Coauth / SharingUrl / AddActivities are
          # intentionally unimplemented).
          dotnet "${{ steps.publish-validator.outputs.bin }}/Microsoft.Office.WopiValidator.dll" \
            --wopisrc "${{ env.HOST_URL }}/wopi/files/${{ env.WOPI_FILE_ID }}" \
            --token "${{ env.WOPI_ACCESS_TOKEN }}" \
            --token_ttl 0 \
            --config "${{ steps.publish-validator.outputs.bin }}/TestCases.xml" \
            --testcategory "${{ env.TEST_CATEGORY }}" \
            2>&1 | tee validator.log || true

          PASS=$(grep -cE '^  Pass:' validator.log || true)
          FAIL=$(grep -cE '^  Fail:' validator.log || true)
          SKIP=$(grep -cE '^  Skipped:' validator.log || true)
          {
            echo "pass=${PASS}"
            echo "fail=${FAIL}"
            echo "skip=${SKIP}"
            echo "exit_code=$([ "${FAIL}" -gt 0 ] && echo 1 || echo 0)"
          } >> "$GITHUB_OUTPUT"

      - name: Stop WopiHost.Validator
        if: always()
        run: |
          if [ -f host.pid ]; then
            kill "$(cat host.pid)" 2>/dev/null || true
            wait "$(cat host.pid)" 2>/dev/null || true
          fi

      - name: Job summary
        if: always()
        run: |
          PASS="${{ steps.validate.outputs.pass }}"
          FAIL="${{ steps.validate.outputs.fail }}"
          SKIP="${{ steps.validate.outputs.skip }}"
          PASS="${PASS:-0}"; FAIL="${FAIL:-0}"; SKIP="${SKIP:-0}"

          {
            echo "## WOPI Validator results"
            echo
            echo "| Status | Count |"
            echo "| --- | ---: |"
            echo "| ✅ Pass | ${PASS} |"
            echo "| ❌ Fail | ${FAIL} |"
            echo "| ⏭️ Skipped | ${SKIP} |"
            echo
            echo "**Validator:** \`WopiValidator ${{ steps.publish-validator.outputs.version }}\` (from nuget.org)  "
            echo "**Test category:** \`${{ env.TEST_CATEGORY }}\`  "
            echo "**WopiSrc:** \`${{ env.HOST_URL }}/wopi/files/${{ env.WOPI_FILE_ID }}\`"
            echo
            echo "_Full \`validator.log\` and \`host.log\` are attached as the **wopi-validator-output** artifact on this run._"
            echo

            if [ "${FAIL}" -gt 0 ] && [ -f validator.log ]; then
              echo "<details open><summary><b>Failures (${FAIL})</b></summary>"
              echo
              echo '```'
              awk '
                /^Test group:/ { group=$0; next }
                /^  Fail:/ { print group; printing=1 }
                printing && /^  (Pass|Fail|Skipped):/ && !/^  Fail:/ { printing=0 }
                printing { print }
              ' validator.log
              echo '```'
              echo
              echo "</details>"
              echo
            fi

            if [ -f validator.log ]; then
              echo "<details><summary><b>Full output</b></summary>"
              echo
              echo '```'
              cat validator.log
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wopi-validator-output
          path: |
            validator.log
            host.log
          if-no-files-found: warn

      - name: Post results to PR
        if: always() && github.event_name == 'pull_request_target'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wopi-validator
          message: |
            ## WOPI Validator results

            | Status | Count |
            | --- | ---: |
            | ✅ Pass | ${{ steps.validate.outputs.pass || 0 }} |
            | ❌ Fail | ${{ steps.validate.outputs.fail || 0 }} |
            | ⏭️ Skipped | ${{ steps.validate.outputs.skip || 0 }} |

            **Validator:** `WopiValidator ${{ steps.publish-validator.outputs.version }}` (from nuget.org)
            **Test category:** `${{ env.TEST_CATEGORY }}`

            📋 [Full report and `wopi-validator-output` artifact ↗](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Surface validator failure
        if: always() && steps.validate.outputs.exit_code != '0'
        run: |
          echo "::warning::WOPI validator exited with code ${{ steps.validate.outputs.exit_code }}. See job summary and artifact for details."
