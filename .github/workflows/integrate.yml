name: Build & Test

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - 'LICENSE'
      - '.claude/**'

permissions:
  contents: read
  id-token: write # Required for OIDC

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    - name: Set Cobalt packages token
      run: echo "COBALT_PACKAGES_TOKEN=${{ secrets.COBALT_PACKAGES_TOKEN }}" >> $GITHUB_ENV
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore /p:ContinuousIntegrationBuild=true
    - name: Install Playwright browsers (for sample-app smoke tests)
      run: pwsh artifacts/bin/WopiHost.SmokeTests/debug/playwright.ps1 install --with-deps chromium
    - name: Test
      # The "E2E" category covers tests in WopiHost.E2ETests.Collabora — they require Docker
      # + a real Collabora container and are run from .github/workflows/e2e-collabora.yml on a
      # nightly cron, never per-PR (issue #357 Approach B).
      run: dotnet test --no-build --verbosity normal --filter "Category!=E2E" /p:CollectCoverage=true /p:CoverletOutputFormat=lcov
    - name: Upload coverage to Qlty
      uses: qltysh/qlty-action/coverage@v2
      with:
        oidc: true
        files: "**/coverage.*.info"
        # Coverlet's lcov references source-generated files (LoggerMessage.g.cs,
        # LibraryImports.g.cs, etc.) under artifacts/obj/, which don't exist at
        # publish time. Without this flag Qlty counts them as 0% covered, hence
        # the ~74% vs Codecov's ~93% disparity. See also .qlty/qlty.toml.
        skip-missing-files: true
    - name: Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: FOSSA scan + policy gate
      uses: fossa-contrib/fossa-action@v3
      with:
        fossa-api-key: ${{ secrets.FOSSA_API_KEY }}
        skip-test: false
