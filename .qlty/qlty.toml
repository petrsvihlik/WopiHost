config_version = "0"

exclude_patterns = [
  "**/node_modules/**",
  "**/wwwroot/**",
  "sample/**",
  "infra/**",
  # Source-generated output. Coverlet emits lcov entries for these (Logger source
  # generator, LibraryImport source generator, etc.) but the files don't exist on
  # disk at coverage-publish time — they're build outputs under artifacts/obj/.
  # Without this exclusion, Qlty counts them as 0%-covered and tanks the
  # percentage. (Codecov auto-skips files missing from the repo, which is why
  # the same lcov yields ~93% there.)
  "**/artifacts/**",
  "**/obj/**",
  "**/*.g.cs",
]

test_patterns = [
  "**/test/**"
]

[[source]]
name = "default"
default = true

# Minimal-API endpoint handlers naturally collect many DI services + bound HTTP
# parameters (route values, headers, body) as positional parameters — that's the
# framework's injection idiom. The handlers in src/WopiHost.Core/Endpoints/ range from
# 6 to ~18 parameters, well past qlty's default function-parameters threshold (~5).
# The deps-record workaround was tried and removed in 0fa1e39 after it proved more
# trouble than it was worth (see #430 history).
#
# Raise the C# function-parameters threshold globally. The only code that approaches
# this threshold is the endpoint directory; everything else in the repo is well under,
# so the bump is effectively scoped to where it's needed. The [[triage]] block tried
# previously didn't actually suppress — the rule kept firing in PR review comments —
# so we switch to the language-level threshold override per qlty's documented schema.
[language.csharp.smells.function_parameters]
threshold = 50
