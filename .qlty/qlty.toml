config_version = "0"

exclude_patterns = [
  "**/node_modules/**",
  "**/wwwroot/**",
  "sample/**",
  "infra/**",
  # Source-generated output. Coverlet emits lcov entries for these (Logger source
  # generator, LibraryImport source generator, etc.) but the files don't exist on
  # disk at coverage-publish time — they're build outputs under artifacts/obj/.
  # Without this exclusion, Qlty counts them as 0%-covered and tanks the
  # percentage. (Codecov auto-skips files missing from the repo, which is why
  # the same lcov yields ~93% there.)
  "**/artifacts/**",
  "**/obj/**",
  "**/*.g.cs",
]

test_patterns = [
  "**/test/**"
]

[[source]]
name = "default"
default = true

# Minimal-API endpoint handlers naturally collect many DI services + bound HTTP
# parameters (route values, headers, body) as positional parameters — that's the
# framework's injection idiom. qlty's function-parameters and file-complexity
# rules are calibrated for OOP class methods; ignoring them here keeps the
# natural Minimal-API shape instead of routing every handler through a deps
# record or a hand-rolled handler class (see the #430 commit history for the
# round-trip that proved the record bundles weren't worth the indirection).
#
# similar-code / identical-code fire on the parameter-signature overlap between
# handlers (e.g. multiple mutating handlers share the same lock-provider +
# writable-storage parameter block). The duplication is the framework's binding
# contract, not extractable shared logic — there's no useful method to factor
# out, only the deps records we just removed.
[[ignore]]
linters = ["qlty"]
rules = ["function-parameters", "file-complexity", "similar-code", "identical-code"]
file_patterns = ["src/WopiHost.Core/Endpoints/**"]
