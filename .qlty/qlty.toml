config_version = "0"

exclude_patterns = [
  "**/node_modules/**",
  "**/wwwroot/**",
  "sample/**",
  "infra/**",
  # Source-generated output. Coverlet emits lcov entries for these (Logger source
  # generator, LibraryImport source generator, etc.) but the files don't exist on
  # disk at coverage-publish time — they're build outputs under artifacts/obj/.
  # Without this exclusion, Qlty counts them as 0%-covered and tanks the
  # percentage. (Codecov auto-skips files missing from the repo, which is why
  # the same lcov yields ~93% there.)
  "**/artifacts/**",
  "**/obj/**",
  "**/*.g.cs",
]

test_patterns = [
  "**/test/**"
]

[[source]]
name = "default"
default = true

# Minimal-API endpoint handlers naturally collect many DI services as positional
# parameters (the framework's parameter-injection idiom). qlty's function-parameters
# and file-complexity rules are calibrated for OOP class methods; ignoring them
# here lets us keep the natural Minimal-API shape rather than over-engineering
# per-handler service records past the point of clarity.
[[ignore]]
linters = ["qlty"]
rules = ["function-parameters", "file-complexity"]
file_patterns = ["src/WopiHost.Core/Endpoints/**"]
