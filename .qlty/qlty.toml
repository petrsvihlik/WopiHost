config_version = "0"

exclude_patterns = [
  "**/node_modules/**",
  "**/wwwroot/**",
  "sample/**",
  "infra/**",
  # Source-generated output. Coverlet emits lcov entries for these (Logger source
  # generator, LibraryImport source generator, etc.) but the files don't exist on
  # disk at coverage-publish time — they're build outputs under artifacts/obj/.
  # Without this exclusion, Qlty counts them as 0%-covered and tanks the
  # percentage. (Codecov auto-skips files missing from the repo, which is why
  # the same lcov yields ~93% there.)
  "**/artifacts/**",
  "**/obj/**",
  "**/*.g.cs",
]

test_patterns = [
  "**/test/**"
]

[[source]]
name = "default"
default = true

# Minimal-API endpoint handlers naturally collect many DI services + bound HTTP
# parameters (route values, headers, body) as positional parameters — that's the
# framework's injection idiom. qlty's function-parameters and file-complexity
# rules are calibrated for OOP class methods; the same goes for the duplication
# / similar-code / identical-code rules, which fire on the parameter-signature
# overlap between handlers (e.g. several mutating handlers share the same
# lock-provider + writable-storage parameter block — that's the framework's
# binding contract, not extractable shared logic; the deps records that
# collapsed the duplication were removed in 0fa1e39 after they proved more
# trouble than they were worth — see #430 history).
#
# The full csharp smell set is suppressed here for the endpoint directory —
# narrower opt-outs proved fragile across refactors. The directory is small
# (8 files), shallow, and reviewed end-to-end on every PR touching it, so the
# qlty signal here is low-value relative to the maintenance churn.
[[ignore]]
linters = ["qlty"]
rules = [
  "function-parameters",
  "file-complexity",
  "function-complexity",
  "similar-code",
  "identical-code",
  "duplication",
  "boolean-logic",
  "nested-control-flow",
  "return-statements",
]
file_patterns = ["src/WopiHost.Core/Endpoints/**"]
