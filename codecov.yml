coverage:
  status:
    project:
      default:
        target: auto
        # 2% — wide enough to absorb one-off structural moves (e.g. an [ExcludeFromCodeCoverage]
        # coming off a file that's only ~85% covered) without masking a real coverage regression.
        # Sustained drift below the previous baseline still trips the gate on subsequent PRs.
        threshold: 2%
    patch:
      default:
        target: auto
        # Patch coverage on a single PR shouldn't fail when the change is mostly tests that
        # uncover previously-excluded code — those tests count as the patch's diff but the
        # auto-target is the project's prior coverage (~95%). 90% is a realistic floor for
        # PRs that mix new tests with new (or now-measured) production code.
        threshold: 5%

# Sample / app-host / validator code is illustrative — not exercised by the unit tests that
# feed coverage. Excluding them keeps the repo's coverage signal focused on src/* libraries.
ignore:
  - "sample/**/*"
  - "infra/**/*"
  - "test/**/*"
